{% extends 'base.html' %}
{% block content %}
<section class='card'>
  <h2>Lights</h2>
  <p>RGB eye control for status, testing, future Bob mood swings, and one legally questionable police mode.</p>
  <div class='button-grid'>
    <button data-action='led-off'>Off</button>
    <button data-action='led-ready'>Green</button>
    <button data-action='led-error'>Red</button>
    <button data-action='led-custom-blue'>Blue</button>
    <button data-action='led-custom-white'>White</button>
    <button data-action='led-police'>Police</button>
    <button data-action='led-auto'>Auto</button>
    <button id="btn-customize-lights" style="border-color:var(--accent); color:var(--accent);">Customize</button>
  </div>
</section>

<!-- Custom Color Picker Modal -->
<div id="led-custom-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:100; align-items:center; justify-content:center; backdrop-filter:blur(5px);">
  <div class="card" style="max-width:320px; width:90%; text-align:center;">
    <h3 style="margin-top:0;">Custom LED Color</h3>
    <p class="muted" style="font-size:0.85rem; margin-bottom:20px;">Pick a color for the CUSTOM preset slot.</p>
    
    <input type="color" id="led-color-picker" value="#ff00ff" style="width:100%; height:80px; padding:0; border:none; border-radius:10px; cursor:pointer; margin-bottom:20px; background:transparent;">
    
    <div style="display:flex; gap:10px;">
      <button onclick="document.getElementById('led-custom-modal').style.display='none'" style="flex:1; background:transparent; border:1px solid var(--border); color:var(--muted); cursor:pointer;">Cancel</button>
      <button onclick="saveCustomColor()" style="flex:1; background:var(--accent-dim); border:1px solid var(--accent); color:var(--accent); cursor:pointer;">Apply &amp; Save</button>
    </div>
  </div>
</div>

<script>
document.getElementById('btn-customize-lights').addEventListener('click', () => {
  document.getElementById('led-custom-modal').style.display = 'flex';
});

async function saveCustomColor() {
  const hex = document.getElementById('led-color-picker').value;
  // Convert hex to rgb
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);

  try {
    const res = await fetch('/api/lights/color', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ r, g, b })
    });
    const d = await res.json();
    if (d.ok) {
      document.getElementById('led-custom-modal').style.display = 'none';
      // If we're on the dashboard/lights page, we might want to update some local state, 
      // but simply closing the modal is enough for now. The backend will switch to this color.
    } else {
      alert('Error updating custom color.');
    }
  } catch (err) {
    alert('Network error saving custom color.');
  }
}
</script>
{% endblock %}
